apiVersion: batch/v1
kind: Job
metadata:
  name: bowtie2-hg38-download
  namespace: nextflow
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: nextflow-sa
      containers:
        - name: downloader
          image: amazon/aws-cli:2.17.0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              DEST=/mnt/nas/pipeline_assets/bowtie2/hg38
              mkdir -p "$DEST"
              echo "Downloading Bowtie2 hg38 index to $DEST ..."
              aws s3 cp --no-sign-request --recursive --region eu-west-1 \
                s3://ngi-igenomes/igenomes/Homo_sapiens/UCSC/hg38/Sequence/Bowtie2Index/ \
                "$DEST/"
              echo "Done. Contents:"
              ls -lh "$DEST"
              echo "Total size:"
              du -sh "$DEST"
          resources:
            requests:
              memory: 2Gi
              cpu: "1"
            limits:
              memory: 4Gi
              cpu: "2"
          volumeMounts:
            - name: nas
              mountPath: /mnt/nas
      volumes:
        - name: nas
          persistentVolumeClaim:
            claimName: nextflow-nas-pvc
