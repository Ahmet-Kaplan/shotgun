# ---------------------------------------------------------------------------
# CIFS / SMB credentials for the NAS-backed PersistentVolume.
#
# REPLACE the placeholder values below with your NAS account credentials
# BEFORE running `kubectl apply -f nas-secret.yaml`.
#
# Do NOT commit real credentials to git. Either:
#   * keep this file untracked locally
#     (`git update-index --assume-unchanged k8s/nas-secret.yaml`)
#     after filling it in, or
#   * skip the YAML entirely and create the secret imperatively:
#       kubectl -n nextflow create secret generic nas-creds \
#         --from-literal=username='<user>' \
#         --from-literal=password='<pass>'
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: nas-creds
  namespace: nextflow
type: Opaque
stringData:
  username: YOUR-NAS-USERNAME
  password: YOUR-NAS-PASSWORD
